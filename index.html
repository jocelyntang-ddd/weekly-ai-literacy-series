<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Literacy Assignments</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #252933;
    --accent: #f5c842;
    --accent2: #e8754a;
    --text: #e8eaf0;
    --muted: #7a7f91;
    --done-bg: #131a14;
    --done-border: #2a3d2b;
    --max: 720px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 24px 36px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    text-align: center;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 420px; height: 320px;
    background: radial-gradient(circle, rgba(245,200,66,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 12vw, 80px);
    letter-spacing: 0.04em;
    line-height: 0.92;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 14px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    max-width: 380px;
  }

  /* ── Progress ── */
  .progress-bar-wrap {
    width: 100%;
    max-width: var(--max);
    padding: 28px 24px 0;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .progress-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: var(--accent);
  }
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* ── List ── */
  .list {
    width: 100%;
    max-width: var(--max);
    padding: 24px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: grid;
    grid-template-columns: 140px 1fr;
    align-items: stretch;
    transition: border-color 0.2s, background 0.2s;
    animation: slideIn 0.4s both;
    overflow: hidden;
    position: relative;
  }
  .card:hover { border-color: #3a3f52; }
  .card.done { background: var(--done-bg); border-color: var(--done-border); }
  .card.done:hover { border-color: #3a5e3c; }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
  }
  .card.done::before { background: #4caf6e; opacity: 1; }
  .card:hover::before { opacity: 0.4; }

  /* ── Thumbnail ── */
  .thumb-link {
    display: block;
    position: relative;
    overflow: hidden;
    background: #111318;
    text-decoration: none;
    min-height: 95px;
  }
  .thumb-link img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: transform 0.3s, opacity 0.4s;
  }
  .thumb-link img.loaded { opacity: 0.88; }
  .thumb-link:hover img.loaded { transform: scale(1.05); opacity: 1; }
  .card.done .thumb-link img { opacity: 0.3; filter: grayscale(60%); }

  .thumb-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .thumb-placeholder svg { opacity: 0.2; }
  .thumb-placeholder span { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
  }
  .play-circle {
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid rgba(255,255,255,0.3);
    transition: background 0.2s, transform 0.2s;
  }
  .thumb-link:hover .play-circle {
    background: rgba(245,200,66,0.92);
    transform: scale(1.1);
  }
  .play-circle svg { margin-left: 2px; }

  .done-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,28,12,0.45);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 3;
    pointer-events: none;
  }
  .card.done .done-overlay { opacity: 1; }

  /* ── Card right ── */
  .card-right {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 13px 14px 12px 14px;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card-meta {
    display: flex;
    align-items: center;
  }
  .card-num {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .checkmark {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    flex-shrink: 0;
    margin-left: auto;
  }
  .card.done .checkmark { background: #4caf6e; border-color: #4caf6e; }
  .checkmark svg { opacity: 0; transform: scale(0.5); transition: all 0.2s; }
  .card.done .checkmark svg { opacity: 1; transform: scale(1); }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.35;
  }
  .card.done .card-title {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: #3a5e3c;
  }

  .card-note {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    padding: 7px 10px;
    border-left: 2px solid rgba(245,200,66,0.35);
    background: rgba(245,200,66,0.04);
    border-radius: 0 5px 5px 0;
  }
  .card-note strong { color: rgba(245,200,66,0.7); font-weight: 500; }

  .card-actions { display: flex; gap: 7px; flex-wrap: wrap; }
  .btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-video {
    background: rgba(245,200,66,0.1);
    color: var(--accent);
    border: 1px solid rgba(245,200,66,0.25);
  }
  .btn-video:hover { background: rgba(245,200,66,0.2); border-color: var(--accent); }
  .btn-form {
    background: rgba(232,117,74,0.1);
    color: var(--accent2);
    border: 1px solid rgba(232,117,74,0.25);
  }
  .btn-form:hover { background: rgba(232,117,74,0.2); border-color: var(--accent2); }
  .btn svg { flex-shrink: 0; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:nth-child(1) { animation-delay: 0.03s; }
  .card:nth-child(2) { animation-delay: 0.06s; }
  .card:nth-child(3) { animation-delay: 0.09s; }
  .card:nth-child(4) { animation-delay: 0.12s; }
  .card:nth-child(5) { animation-delay: 0.15s; }
  .card:nth-child(6) { animation-delay: 0.18s; }
  .card:nth-child(7) { animation-delay: 0.21s; }
  .card:nth-child(8) { animation-delay: 0.24s; }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    header { padding: 36px 20px 28px; }
    .progress-bar-wrap { padding: 22px 16px 0; }
    .list { padding: 16px 16px 0; gap: 10px; }
    .card { grid-template-columns: 110px 1fr; }
    .thumb-link { min-height: 85px; }
    .card-right { padding: 10px 12px 10px 12px; gap: 7px; }
    .card-title { font-size: 13px; }
    .btn { padding: 5px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Course Assignments</div>
  <h1>AI <span>Literacy</span></h1>
  <p class="header-sub">Watch each video, then complete the form. Note: You may only submit ONCE per form.</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span class="progress-label">Your Progress</span>
    <span class="progress-count" id="progressCount">0 / 8</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="list" id="assignmentList"></div>

<script>
const assignments = [
  { title: "Launch",                        videoId: "N3-gU6gyL_Q", video: "https://youtu.be/N3-gU6gyL_Q", form: "https://docs.google.com/forms/d/e/1FAIpQLSe0Kl8ByoECkhj7eSJ-yaKcRTLDWO9aJNySsLKQqATH7gznnQ/viewform" },
  { title: "How ChatGPT Works",             videoId: "Ik7mLwRY4a0", video: "https://youtu.be/Ik7mLwRY4a0", form: "https://docs.google.com/forms/d/e/1FAIpQLSeCvDoxLvCd1zDrnQLkb58NrD0F2b19Lwcj2W0G4ibeZpXcQw/viewform" },
  { title: "What Happens to Your Data?",    videoId: "gcKG1ik6kls", video: "https://youtu.be/gcKG1ik6kls", form: "https://docs.google.com/forms/d/e/1FAIpQLScCiEoBfGBmmGWsGODk67eOIQnnKrQm1kF8vfBQJ9_n5skayA/viewform", note: "This video explains what free AI tools can do with your data. If you have a DDD Enterprise account (for team leads, project managers, supervisors, and other management level employees) for ChatGPT and Gemini, your data is not sold or used to train models." },
  { title: 'The "Ask Me Questions" Prompt', videoId: "J54JsMLwfv8", video: "https://youtu.be/J54JsMLwfv8", form: "https://forms.gle/FZQeQr6wiGumm5yBA" },
  { title: "AI and Privacy",                videoId: "0F24_tvxpxY", video: "https://youtu.be/0F24_tvxpxY", form: "https://forms.gle/wuugWrZYByBWCDtT7" },
  { title: "Tokenization",                  videoId: "FySwFy6eLGU", video: "https://youtu.be/FySwFy6eLGU", form: "https://docs.google.com/forms/d/e/1FAIpQLSfkMb_eInlKYyrDb4oUvuMMI31t7Ysk_nTsFrDl931FkNDquQ/viewform" },
  { title: "Context Windows",               videoId: "JFudZD46SGc", video: "https://youtu.be/JFudZD46SGc", form: "https://docs.google.com/forms/d/e/1FAIpQLScUo604M-BnltJK6p3AOUPbOOpiqXGKUIBDtHO_Uk2mACZbVg/viewform" },
  { title: "Copyright and AI",              videoId: "zxOLzJpbfyU", video: "https://youtu.be/zxOLzJpbfyU", form: "https://docs.google.com/forms/d/1IhzRPldSjGZeOzSkfh4wP2LPOwAdNX1t-Gr3vNw5UgY/viewform" }
];

const STORAGE_KEY = 'ai_literacy_done';
function loadDone() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
function saveDone(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

let done = loadDone();

function updateProgress() {
  const pct = (done.length / assignments.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done.length} / ${assignments.length}`;
}

async function fetchThumb(videoId) {
  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.thumbnail_url || null;
  } catch { return null; }
}

function toggleDone(i) {
  const idx = done.indexOf(i);
  if (idx === -1) done.push(i); else done.splice(idx, 1);
  saveDone(done);
  const cards = document.querySelectorAll('.card');
  if (cards[i]) {
    if (done.includes(i)) cards[i].classList.add('done');
    else cards[i].classList.remove('done');
  }
  updateProgress();
}

function render() {
  const list = document.getElementById('assignmentList');
  list.innerHTML = '';

  assignments.forEach((a, i) => {
    const isDone = done.includes(i);
    const card = document.createElement('div');
    card.className = 'card' + (isDone ? ' done' : '');

    card.innerHTML = `
      <a class="thumb-link" href="${a.video}" target="_blank" rel="noopener">
        <div class="thumb-placeholder">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M10 9l5 3-5 3V9z" fill="white" stroke="none"/>
          </svg>
          <span>Video</span>
        </div>
        <div class="play-overlay">
          <div class="play-circle">
            <svg width="11" height="12" viewBox="0 0 12 13" fill="white">
              <path d="M2 2.4C2 1.56 2.93 1.07 3.62 1.54l6.4 4.1a.8.8 0 0 1 0 1.32l-6.4 4.1C2.93 11.43 2 10.94 2 10.1V2.4z"/>
            </svg>
          </div>
        </div>
        <div class="done-overlay">
          <svg width="32" height="32" viewBox="0 0 34 34" fill="none">
            <circle cx="17" cy="17" r="15" fill="rgba(76,175,110,0.9)"/>
            <path d="M11 17.5l5 5 8.5-9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </a>
      <div class="card-right">
        <div class="card-meta">
          <span class="card-num">Assignment ${String(i+1).padStart(2,'0')}</span>
          <div class="checkmark">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 3.5L3.8 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="card-title">${a.title}</div>
        ${a.note ? `<div class="card-note"><strong>Note:</strong> ${a.note}</div>` : ''}
        <div class="card-actions">
          <a class="btn btn-video" href="${a.video}" target="_blank" rel="noopener">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M2 2.4C2 1.56 2.93 1.07 3.62 1.54l6.4 4.1a.8.8 0 0 1 0 1.32l-6.4 4.1C2.93 11.43 2 10.94 2 10.1V2.4z"/></svg>
            Watch
          </a>
          <a class="btn btn-form" href="${a.form}" target="_blank" rel="noopener">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5"/><path d="M4 4h4M4 6h4M4 8h2"/></svg>
            Form
          </a>
        </div>
      </div>
    `;

    card.querySelector('.card-right').addEventListener('click', () => toggleDone(i));

    list.appendChild(card);

    // Load thumbnail async
    fetchThumb(a.videoId).then(url => {
      if (!url) return;
      const link = card.querySelector('.thumb-link');
      const img = document.createElement('img');
      img.alt = a.title;
      img.onload = () => img.classList.add('loaded');
      img.src = url;
      link.insertBefore(img, link.firstChild);
    });
  });

  updateProgress();
}

render();
</script>
</body>
</html>
